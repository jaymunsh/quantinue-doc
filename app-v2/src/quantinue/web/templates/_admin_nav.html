{# 관리자 화면 넷이 공유하는 내비.

   하나로 모은 이유는 실제로 어긋나 있었기 때문이다 — 같은 `/admin`이 세
   화면에서 "잡 체인"으로 불리고 한 곳에서만 순서가 달랐다. 사이드바는
   "지금 어디에 있고 어디로 갈 수 있나"를 답하는 자리라, 화면마다 답이
   다르면 그 답을 믿을 수 없게 된다.

   호출부는 `{% with current = '...' %}`로 현재 화면을 알려준다. #}
<nav class="nav-group" aria-label="화면">
  <p class="nav-label">화면</p>
  <a class="nav-link{% if current == 'control' %} nav-link--current{% endif %}"
     href="/admin"{% if current == 'control' %} aria-current="page"{% endif %}>관제실</a>
  <a class="nav-link{% if current == 'schedule' %} nav-link--current{% endif %}"
     href="/admin/schedule"{% if current == 'schedule' %} aria-current="page"{% endif %}>운영 기준</a>
  <a class="nav-link{% if current == 'logs' %} nav-link--current{% endif %}"
     href="/admin/logs"{% if current == 'logs' %} aria-current="page"{% endif %}>작동 로그</a>
  <a class="nav-link{% if current == 'accounts' %} nav-link--current{% endif %}"
     href="/admin/accounts"{% if current == 'accounts' %} aria-current="page"{% endif %}>계좌 관리</a>
</nav>
