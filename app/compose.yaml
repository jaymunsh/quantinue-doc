services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: quantinue
      POSTGRES_USER: quantinue
      POSTGRES_PASSWORD: quantinue
    volumes:
      - quantinue_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    ports:
      - "127.0.0.1:5444:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantinue -d quantinue"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  web:
    build: .
    environment:
      QUANTINUE_DATA_MODE: ${QUANTINUE_DATA_MODE:-public}
      QUANTINUE_DATABASE_MODE: postgres
      QUANTINUE_DATABASE_URL: postgresql+asyncpg://quantinue:quantinue@db:5432/quantinue
      QUANTINUE_LLM_MODE: local
      QUANTINUE_LOCAL_LLM_BASE_URL: ${QUANTINUE_LOCAL_LLM_BASE_URL:-http://host.docker.internal:8888/v1}
      QUANTINUE_LOCAL_LLM_API_KEY: ${QUANTINUE_LOCAL_LLM_API_KEY:?set QUANTINUE_LOCAL_LLM_API_KEY in .env}
      QUANTINUE_LOCAL_LLM_MODEL: ${QUANTINUE_LOCAL_LLM_MODEL:-Qwen3.6-35B-A3B-OptiQ-4bit}
      QUANTINUE_LLM_TIMEOUT_SECONDS: "300"
      QUANTINUE_BROKER_MODE: mock
      QUANTINUE_TRADING_ENABLED: "false"
    ports:
      - "0.0.0.0:8011:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

volumes:
  quantinue_pgdata:
